<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Robô Reativo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: #080f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ── TOPBAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 42px;
      flex-shrink: 0;
      border-bottom: 0.5px solid #1e293b;
      background: #0f172a;
      gap: 8px;
    }
    #topbar h1 { font-size: 13px; font-weight: 500; white-space: nowrap; }
    #topbar-right { display: flex; gap: 6px; flex-shrink: 0; }

    .icon-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: #1e293b; border: 0.5px solid #334155;
      border-radius: 6px; cursor: pointer; color: #94a3b8;
      font-size: 14px; transition: background .15s, color .15s;
      user-select: none; -webkit-user-select: none;
    }
    .icon-btn:hover, .icon-btn:active { background: #273548; color: #e2e8f0; }

    /* ── CORPO ── */
    #body {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }

    /* arena ocupa tudo que sobrar */
    #arena-wrap {
      flex: 1; min-width: 0; min-height: 0;
      display: flex; position: relative;
    }
    #arena { display: block; width: 100%; height: 100%; }

    /* ── PAINEL ── */
    #panel {
      width: 256px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 0.5px solid #1e293b;
      background: #0f172a;
      overflow: hidden;
    }

    .panel-title {
      font-size: 9px; font-weight: 500; color: #475569;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 7px 12px; border-bottom: 0.5px solid #1e293b; flex-shrink: 0;
    }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
      padding: 8px 12px; border-bottom: 0.5px solid #1e293b; flex-shrink: 0;
    }
    .stat-cell { background: #1e293b; border-radius: 5px; padding: 5px 8px; }
    .stat-lbl { font-size: 8px; color: #475569; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val { font-size: 16px; font-weight: 500; color: #e2e8f0; font-variant-numeric: tabular-nums; }

    .section { padding: 8px 12px; border-bottom: 0.5px solid #1e293b; flex-shrink: 0; }
    .sec-label {
      font-size: 8px; color: #475569; font-weight: 500;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
    }
    .none-msg { font-size: 10px; color: #334155; }

    .hsv-row { display: flex; gap: 4px; }
    .hsv-cell { flex: 1; background: #1e293b; border-radius: 4px; padding: 4px 3px; text-align: center; }
    .hsv-lbl { font-size: 8px; color: #475569; text-transform: uppercase; }
    .hsv-val { font-size: 12px; font-weight: 500; color: #e2e8f0; font-variant-numeric: tabular-nums; }

    .bar-group { margin-bottom: 4px; }
    .bar-header { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .bar-name { font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px; }
    .bar-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .bar-pct { font-size: 10px; font-weight: 500; color: #e2e8f0; font-variant-numeric: tabular-nums; }
    .bar-bg { background: #1e293b; border-radius: 2px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width .12s; }

    .decision-box { border-radius: 5px; padding: 7px 9px; background: #1e293b; margin-bottom: 6px; }
    .dec-name { font-size: 12px; font-weight: 500; color: #f1f5f9; }
    .dec-sub { font-size: 10px; color: #64748b; margin-top: 1px; }
    .conf-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .conf-label { font-size: 9px; color: #475569; }
    .conf-pct { font-size: 10px; font-weight: 500; color: #e2e8f0; font-variant-numeric: tabular-nums; }

    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 12px; border-bottom: 0.5px solid #1e293b; flex-shrink: 0;
    }
    .log-clear { font-size: 9px; color: #334155; cursor: pointer; }
    .log-clear:hover { color: #64748b; }
    .log-wrap { flex: 1; overflow-y: auto; padding: 3px 12px; min-height: 0; }
    .log-wrap::-webkit-scrollbar { width: 2px; }
    .log-wrap::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
    .log-entry {
      display: flex; gap: 5px; padding: 2px 0;
      border-bottom: 0.5px solid #1e293b22;
      font-size: 10px; line-height: 1.4;
    }
    .log-time { color: #334155; font-variant-numeric: tabular-nums; min-width: 28px; flex-shrink: 0; }
    .log-msg { color: #94a3b8; }

    .panel-controls {
      display: flex; gap: 5px; padding: 8px 12px;
      border-top: 0.5px solid #1e293b; background: #0a1120; flex-shrink: 0;
    }
    .ctrl-btn {
      flex: 1; padding: 5px 0; font-size: 10px; font-family: inherit;
      color: #94a3b8; background: #1e293b; border: 0.5px solid #334155;
      border-radius: 4px; cursor: pointer; transition: background .15s, color .15s;
    }
    .ctrl-btn:hover, .ctrl-btn:active { background: #273548; color: #e2e8f0; }

    /* ── MOBILE ── */
    @media (max-width: 580px) {
      #body { flex-direction: column; }
      #arena-wrap { flex: 0 0 auto; height: 52vw; min-height: 180px; }
      #panel {
        width: 100%; flex: 1;
        border-left: none; border-top: 0.5px solid #1e293b;
        overflow-y: auto;
      }
      .log-wrap { max-height: 80px; flex: none; }
      /* esconde log-wrap do flex e deixa o painel inteiro scrollar */
    }
  </style>
</head>
<body>
<div id="root">

  <div id="topbar">
    <h1>🤖 Robô Reativo — Visão de Cores</h1>
    <div id="topbar-right">
      <div class="icon-btn" id="btnPlay" title="Pausar/Continuar">⏸</div>
      <div class="icon-btn" id="btnSpeed" title="Velocidade">1×</div>
      <div class="icon-btn" id="btnReset" title="Reiniciar">↺</div>
      <div class="icon-btn" id="btnFS" title="Tela cheia">⛶</div>
    </div>
  </div>

  <div id="body">
    <div id="arena-wrap">
      <canvas id="arena"></canvas>
    </div>

    <div id="panel">
      <div class="panel-title">Painel neural · tempo real</div>

      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-lbl">Pontos</div><div class="stat-val" id="pts">0</div></div>
        <div class="stat-cell"><div class="stat-lbl">Coletados</div><div class="stat-val" id="col">0</div></div>
        <div class="stat-cell"><div class="stat-lbl">Fugidos</div><div class="stat-val" id="fug">0</div></div>
        <div class="stat-cell"><div class="stat-lbl">Colisões</div><div class="stat-val" id="dmg">0</div></div>
      </div>

      <div class="section">
        <div class="sec-label">Objeto mais próximo (HSV)</div>
        <div id="near-none" class="none-msg">Nenhum no alcance de detecção</div>
        <div id="near-info" style="display:none">
          <div class="hsv-row">
            <div class="hsv-cell"><div class="hsv-lbl">H°</div><div class="hsv-val" id="hval">0</div></div>
            <div class="hsv-cell"><div class="hsv-lbl">S%</div><div class="hsv-val" id="sval">0</div></div>
            <div class="hsv-cell"><div class="hsv-lbl">V%</div><div class="hsv-val" id="vval">0</div></div>
            <div class="hsv-cell"><div class="hsv-lbl">Dist</div><div class="hsv-val" id="dval">0</div></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">Scores por cor (HSV)</div>
        <div id="scores-panel"></div>
      </div>

      <div class="section">
        <div class="sec-label">Decisão atual</div>
        <div class="decision-box" id="dec-box">
          <div class="dec-name" id="dec-name">Explorando</div>
          <div class="dec-sub" id="dec-sub">Nenhum alvo no alcance</div>
        </div>
        <div class="conf-row">
          <span class="conf-label">Confiança</span>
          <span class="conf-pct" id="conf-pct">—</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="conf-bar" style="width:0%;background:#1d9e75"></div></div>
      </div>

      <div class="log-header">
        <span class="sec-label" style="margin:0">Log de ações</span>
        <span class="log-clear" id="clearLog">limpar</span>
      </div>
      <div class="log-wrap" id="log"></div>

      <div class="panel-controls">
        <button class="ctrl-btn" id="btnPlay2">Pausar</button>
        <button class="ctrl-btn" id="btnSpeed2">Normal</button>
        <button class="ctrl-btn" id="btnReset2">Reiniciar</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  const wrap = document.getElementById('arena-wrap');
  W = wrap.clientWidth || 400;
  H = wrap.clientHeight || 400;
  canvas.width = W;
  canvas.height = H;
}

const RULES = [
  { name:'Vermelho', hex:'#e53935', action:'PEGAR',    pts:+10, flee:false, hueRanges:[[0,15],[345,360]], minS:.30, minV:.20 },
  { name:'Verde',    hex:'#43a047', action:'APROXIMAR',pts:+8,  flee:false, hueRanges:[[75,165]],         minS:.25, minV:.20 },
  { name:'Azul',     hex:'#1e88e5', action:'RECUAR',   pts:-5,  flee:true,  hueRanges:[[180,270]],        minS:.25, minV:.15 },
  { name:'Amarelo',  hex:'#fdd835', action:'ALERTAR',  pts:-8,  flee:true,  hueRanges:[[40,75]],          minS:.35, minV:.30 },
  { name:'Roxo',     hex:'#8e24aa', action:'PEGAR',    pts:+15, flee:false, hueRanges:[[270,320]],        minS:.30, minV:.20 },
  { name:'Laranja',  hex:'#fb8c00', action:'DESVIAR',  pts:-3,  flee:true,  hueRanges:[[15,40]],          minS:.35, minV:.20 },
];

const ROBOT_R=16, OBJ_R=11, DETECT_R=100;
const SPEEDS=[1,2,4], SPEED_LABELS=['Normal','Rápido','Turbo'], SPEED_ICONS=['1×','2×','4×'];
let speedIdx=0, paused=false;
let robot, objects, score, collected, fled_c, dmg, tick, lastNear, lastScores;

const rand=(a,b)=>Math.random()*(b-a)+a;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d!==0){
    if(mx===r)h=((g-b)/d+(g<b?6:0))/6;
    else if(mx===g)h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
  }
  return{h:h*360,s,v};
}
const inRange=(h,ranges)=>ranges.some(([a,b])=>h>=a&&h<=b);

function scoreColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const{h,s,v}=rgbToHsv(r,g,b);
  const raw=RULES.map(c=>{
    if(!inRange(h,c.hueRanges))return 0;
    if(s<c.minS||v<c.minV)return 0.1;
    return 0.6+0.2*((s-c.minS)/(1-c.minS))+0.2*((v-c.minV)/(1-c.minV));
  });
  const sum=raw.reduce((a,b)=>a+b,0)||1;
  return raw.map(x=>x/sum);
}

function spawnObject(){
  const rule=RULES[Math.floor(Math.random()*RULES.length)];
  let x,y,tries=0;
  do{x=rand(OBJ_R+14,W-OBJ_R-14);y=rand(OBJ_R+14,H-OBJ_R-14);tries++;}
  while(robot&&dist({x,y},robot)<130&&tries<20);
  return{x,y,vx:rand(-0.7,0.7),vy:rand(-0.7,0.7),rule,pt:0,born:Date.now(),ttl:rand(7000,13000)};
}

function reset(){
  resizeCanvas();
  robot={x:W/2,y:H/2,vx:0,vy:0,angle:0,target:null,state:'idle',bt:0};
  objects=[];score=0;collected=0;fled_c=0;dmg=0;tick=0;lastNear=null;lastScores=[];
  for(let i=0;i<5;i++)objects.push(spawnObject());
  document.getElementById('log').innerHTML='';
  updateUI();
}

const fmt=t=>String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');

function addLog(msg,color){
  const el=document.getElementById('log');
  const div=document.createElement('div');
  div.className='log-entry';
  div.innerHTML=`<span class="log-time">${fmt(tick)}</span><span class="log-msg" style="color:${color||'#94a3b8'}">${msg}</span>`;
  el.insertBefore(div,el.firstChild);
  if(el.children.length>50)el.removeChild(el.lastChild);
}

function updateUI(){
  document.getElementById('pts').textContent=score;
  document.getElementById('col').textContent=collected;
  document.getElementById('fug').textContent=fled_c;
  document.getElementById('dmg').textContent=dmg;

  if(lastNear){
    const rr=parseInt(lastNear.rule.hex.slice(1,3),16),
          gg=parseInt(lastNear.rule.hex.slice(3,5),16),
          bb=parseInt(lastNear.rule.hex.slice(5,7),16);
    const{h,s,v}=rgbToHsv(rr,gg,bb);
    document.getElementById('near-none').style.display='none';
    document.getElementById('near-info').style.display='block';
    document.getElementById('hval').textContent=Math.round(h);
    document.getElementById('sval').textContent=Math.round(s*100);
    document.getElementById('vval').textContent=Math.round(v*100);
    document.getElementById('dval').textContent=Math.round(dist(robot,lastNear));
  }else{
    document.getElementById('near-none').style.display='block';
    document.getElementById('near-info').style.display='none';
  }

  const sp=document.getElementById('scores-panel');
  sp.innerHTML='';
  RULES.forEach((c,i)=>{
    const pct=Math.round((lastScores[i]||0)*100);
    sp.innerHTML+=`<div class="bar-group">
      <div class="bar-header">
        <span class="bar-name"><span class="bar-dot" style="background:${c.hex}"></span>${c.name}</span>
        <span class="bar-pct">${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c.hex}"></div></div>
    </div>`;
  });

  if(robot.target){
    const r=robot.target.rule;
    const scores=scoreColor(r.hex),best=scores.indexOf(Math.max(...scores));
    const conf=Math.round(scores[best]*100);
    document.getElementById('dec-name').textContent=(r.flee?'Fugir de ':'Perseguir ')+r.name;
    document.getElementById('dec-sub').textContent=`${r.action} · ${r.pts>0?'+':''}${r.pts} pts`;
    document.getElementById('dec-box').style.background=r.flee?'#2d1515':'#0f2d1a';
    document.getElementById('conf-pct').textContent=conf+'%';
    document.getElementById('conf-bar').style.width=conf+'%';
    document.getElementById('conf-bar').style.background=r.flee?'#e53935':'#1d9e75';
  }else{
    document.getElementById('dec-name').textContent='Explorando';
    document.getElementById('dec-sub').textContent='Nenhum alvo no alcance';
    document.getElementById('dec-box').style.background='#1e293b';
    document.getElementById('conf-pct').textContent='—';
    document.getElementById('conf-bar').style.width='0%';
  }
}

function vision(){
  let nearest=null,nd=Infinity;
  for(const o of objects){const d=dist(robot,o);if(d<DETECT_R&&d<nd){nearest=o;nd=d;}}
  lastNear=nearest;
  lastScores=nearest?scoreColor(nearest.rule.hex):[];
  if(!nearest){robot.state='idle';robot.target=null;return;}
  robot.target=nearest;
  robot.state=nearest.rule.flee?'flee':'chase';
}

function moveRobot(){
  const AC=0.2,FR=0.87,MV=2.8;
  if(robot.state==='idle'){robot.vx+=rand(-0.25,0.25);robot.vy+=rand(-0.25,0.25);}
  else if(robot.state==='chase'&&robot.target){
    const dx=robot.target.x-robot.x,dy=robot.target.y-robot.y,d=Math.hypot(dx,dy)||1;
    robot.vx+=dx/d*AC;robot.vy+=dy/d*AC;robot.angle=Math.atan2(dy,dx);
  }else if(robot.state==='flee'&&robot.target){
    const dx=robot.x-robot.target.x,dy=robot.y-robot.target.y,d=Math.hypot(dx,dy)||1;
    robot.vx+=dx/d*AC;robot.vy+=dy/d*AC;robot.angle=Math.atan2(-dy,-dx);
  }
  robot.vx*=FR;robot.vy*=FR;
  const v=Math.hypot(robot.vx,robot.vy);
  if(v>MV){robot.vx=robot.vx/v*MV;robot.vy=robot.vy/v*MV;}
  robot.x=Math.max(ROBOT_R,Math.min(W-ROBOT_R,robot.x+robot.vx));
  robot.y=Math.max(ROBOT_R,Math.min(H-ROBOT_R,robot.y+robot.vy));
  robot.bt++;tick++;
}

function moveObjects(){
  for(const o of objects){
    o.x+=o.vx*0.5;o.y+=o.vy*0.5;
    if(o.x<OBJ_R||o.x>W-OBJ_R)o.vx*=-1;
    if(o.y<OBJ_R||o.y>H-OBJ_R)o.vy*=-1;
    o.pt++;
  }
}

function collide(){
  const now=Date.now();
  objects=objects.filter(o=>{
    const d=dist(robot,o),exp=(now-o.born)>o.ttl;
    if(d<ROBOT_R+OBJ_R-4){
      score+=o.rule.pts;
      if(o.rule.flee){dmg++;addLog(`<b style="color:${o.rule.hex}">${o.rule.name}</b> — colisão! ${o.rule.pts} pts`,'#ef4444');}
      else{collected++;addLog(`<b style="color:${o.rule.hex}">${o.rule.name}</b> coletado +${o.rule.pts} pts`,'#4ade80');}
      return false;
    }
    if(exp){fled_c++;addLog(`${o.rule.name} expirou`,'#334155');return false;}
    return true;
  });
  while(objects.length<5)objects.push(spawnObject());
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  ctx.beginPath();ctx.arc(robot.x,robot.y,DETECT_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  ctx.setLineDash([4,6]);ctx.stroke();ctx.setLineDash([]);

  for(const o of objects){
    const inR=dist(robot,o)<DETECT_R,pulse=1+0.12*Math.sin(o.pt*0.09),r=OBJ_R*pulse;
    if(inR&&!o.rule.flee){
      ctx.strokeStyle=o.rule.hex+'88';ctx.lineWidth=1;ctx.setLineDash([3,5]);
      ctx.beginPath();ctx.moveTo(robot.x,robot.y);ctx.lineTo(o.x,o.y);ctx.stroke();ctx.setLineDash([]);
    }
    if(inR){ctx.beginPath();ctx.arc(o.x,o.y,r+8,0,Math.PI*2);ctx.fillStyle=o.rule.hex+'22';ctx.fill();}
    ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);ctx.fillStyle=o.rule.hex;ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.font='bold 9px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.rule.flee?'!':'+',o.x,o.y);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='9px sans-serif';
    ctx.textBaseline='top';ctx.fillText(o.rule.name,o.x,o.y+OBJ_R+4);
  }

  const rx=robot.x,ry=robot.y;
  ctx.save();ctx.translate(rx,ry);ctx.rotate(robot.angle);
  ctx.beginPath();ctx.arc(0,0,ROBOT_R,0,Math.PI*2);
  ctx.fillStyle=robot.state==='chase'?'#1e40af':robot.state==='flee'?'#7f1d1d':'#1e293b';
  ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(ROBOT_R-2,0);ctx.lineTo(ROBOT_R+5,0);
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.stroke();
  if((robot.bt%28)<22){
    ctx.beginPath();ctx.arc(-4,-5,2.5,0,Math.PI*2);ctx.arc(4,-5,2.5,0,Math.PI*2);
    ctx.fillStyle=robot.state==='flee'?'#fbbf24':'#7dd3fc';ctx.fill();
  }
  ctx.restore();
  ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('🤖',rx,ry-ROBOT_R);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='9px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('+ coleta   ! fuga',8,6);
}

function loop(){
  if(!paused){
    const s=SPEEDS[speedIdx];
    for(let i=0;i<s;i++){
      if(tick%8===0)vision();
      moveRobot();moveObjects();collide();
    }
    if(tick%4===0)updateUI();
  }
  draw();
  requestAnimationFrame(loop);
}

// Controles sincronizados topbar ↔ painel
function togglePause(){
  paused=!paused;
  document.getElementById('btnPlay').textContent=paused?'▶':'⏸';
  document.getElementById('btnPlay2').textContent=paused?'Continuar':'Pausar';
}
function cycleSpeed(){
  speedIdx=(speedIdx+1)%SPEEDS.length;
  document.getElementById('btnSpeed').textContent=SPEED_ICONS[speedIdx];
  document.getElementById('btnSpeed2').textContent=SPEED_LABELS[speedIdx];
}

document.getElementById('btnPlay').addEventListener('click',togglePause);
document.getElementById('btnPlay2').addEventListener('click',togglePause);
document.getElementById('btnSpeed').addEventListener('click',cycleSpeed);
document.getElementById('btnSpeed2').addEventListener('click',cycleSpeed);
document.getElementById('btnReset').addEventListener('click',reset);
document.getElementById('btnReset2').addEventListener('click',reset);
document.getElementById('clearLog').addEventListener('click',()=>document.getElementById('log').innerHTML='');

// Tela cheia
document.getElementById('btnFS').addEventListener('click',()=>{
  const el=document.documentElement;
  const isFS=document.fullscreenElement||document.webkitFullscreenElement;
  if(!isFS){
    (el.requestFullscreen||el.webkitRequestFullscreen).call(el).catch(()=>{});
    document.getElementById('btnFS').textContent='✕';
  }else{
    (document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});
    document.getElementById('btnFS').textContent='⛶';
  }
});
const onFSChange=()=>{
  const isFS=document.fullscreenElement||document.webkitFullscreenElement;
  document.getElementById('btnFS').textContent=isFS?'✕':'⛶';
  setTimeout(resizeCanvas,50);
};
document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);
window.addEventListener('resize',()=>setTimeout(resizeCanvas,50));

// Inicia
resizeCanvas();
reset();
loop();
</script>
</body>
</html>
